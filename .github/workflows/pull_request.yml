name: zizmor 🌈
on:
  pull_request:

jobs:
  zizmor:
    name: Scan repository with zizmor 🌈
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
      - name: Run zizmor 🌈
        run: uvx zizmor --format=github . > zizmor-output.txt || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Filter findings to PR diff
        run: |
          # Get changed lines from the PR diff
          git diff --unified=0 origin/${{ github.base_ref }}...HEAD | awk '
            /^diff --git/ {
              # extract b/path
              match($0, /b\/(.+)/, m); file = m[1]
            }
            /^@@ / {
              # parse @@ -old +new,count @@ — we care about the + side
              split($3, a, /[,+]/)
              start = a[2] + 0
              count = (a[3] == "" ? 1 : a[3] + 0)
              for (i = start; i < start + count; i++) {
                print file ":" i
              }
            }
          ' > changed-lines.txt

          # Filter zizmor output: emit only annotations whose file:line is in the diff
          while IFS= read -r line; do
            if [[ "$line" =~ ^::.*file=([^,]+),line=([0-9]+) ]]; then
              file="${BASH_REMATCH[1]}"
              lineno="${BASH_REMATCH[2]}"
              if grep -qxF "${file}:${lineno}" changed-lines.txt; then
                echo "$line"
              fi
            fi
          done < zizmor-output.txt
