name: zizmor 🌈
on:
  pull_request:

jobs:
  zizmor:
    name: Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Calculate changes
        id: calculate_changes
        shell: bash
        env:
          BASE_SHA: "${{ github.event.pull_request.base.sha }}"
          HEAD_SHA: "${{ github.event.pull_request.head.sha }}"
        run: |
          set -euo pipefail

          # Get changed files
          git diff --name-only --no-color "$BASE_SHA"..."$HEAD_SHA" > changed_files.txt

          # Filter to files relevant to zizmor
          grep -E '(\.github/workflows/[^/]+\.(yml|yaml)$|(^|/)(action|dependabot)\.(yml|yaml)$)' changed_files.txt > relevant_files.txt || true

          if [ -s relevant_files.txt ]; then
            echo "has_relevant_files=true" >> "$GITHUB_OUTPUT"
            echo "Relevant files:"
            cat relevant_files.txt
          else
            echo "has_relevant_files=false" >> "$GITHUB_OUTPUT"
            echo "No workflow, action, or dependabot files changed — skipping zizmor."
          fi
      - name: Install zizmor
        if: steps.calculate_changes.outputs.has_relevant_files == 'true'
        env:
          ZIZMOR_VERSION: "1.23.1"
          ZIZMOR_SHA256: "67a8df0a14352dd81882e14876653d097b99b0f4f6b6fe798edc0320cff27aff"
        run: |
          set -euo pipefail
          curl -sL "https://github.com/zizmorcore/zizmor/releases/download/v${ZIZMOR_VERSION}/zizmor-x86_64-unknown-linux-gnu.tar.gz" -o zizmor.tar.gz
          echo "${ZIZMOR_SHA256}  zizmor.tar.gz" | sha256sum -c -
          tar -xzf zizmor.tar.gz
          chmod +x zizmor
      - name: Run zizmor 🌈
        if: steps.calculate_changes.outputs.has_relevant_files == 'true'
        run: xargs ./zizmor --format=github < relevant_files.txt > zizmor-output.txt || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Filter findings to PR changed lines
        if: steps.calculate_changes.outputs.has_relevant_files == 'true'
        shell: bash
        env:
          BASE_SHA: "${{ github.event.pull_request.base.sha }}"
          HEAD_SHA: "${{ github.event.pull_request.head.sha }}"
        run: |
          set -euo pipefail

          # Build changed line ranges for the PR (new-file side).
          # Format: file<TAB>start<TAB>end
          git diff --no-color "$BASE_SHA" "$HEAD_SHA" \
            | awk '
              BEGIN { file="" }
              /^\+\+\+ b\// { file=substr($0,7); next }   # "+++ b/path"
              /^\+\+\+ \/dev\/null/ { file=""; next }    # deleted file => ignore
              /^@@/ {
                if (file=="") next
                # Hunk header: @@ -oldStart,oldCount +newStart,newCount @@
                if (match($0, /\+[0-9]+(,[0-9]+)?/)) {
                  seg = substr($0, RSTART+1, RLENGTH-1)   # "newStart,newCount" (no +)
                  n = split(seg, a, ",")
                  start = a[1]
                  count = (n==2 ? a[2] : 1)
                  if (count == 0) next                    # pure deletion hunk
                  end = start + count - 1
                  print file "\t" start "\t" end
                }
              }
            ' > changed_ranges.tsv

          echo "Changed line ranges:"
          cat changed_ranges.tsv || true

          # Filter zizmor output lines to only those whose file+line is in a changed range.
          # zizmor format example:
          # ::warning file=.github/dependabot.yml,line=3,title=...::...
          awk -F'\t' '
            FNR==NR {
              ranges[$1] = ranges[$1] $2 "-" $3 ","
              next
            }
            {
              msg = $0
              file = ""; line = ""

              # Extract file and line from the GitHub Actions annotation prefix
              if (match(msg, /file=([^,]+),line=([0-9]+)/, m)) {
                file = m[1]
                line = m[2] + 0
              } else {
                next
              }

              r = ranges[file]
              if (r == "") next

              n = split(r, parts, ",")
              for (i=1; i<=n; i++) {
                if (parts[i] == "") continue
                split(parts[i], se, "-")
                s = se[1] + 0
                e = se[2] + 0
                if (line >= s && line <= e) { print msg; break }
              }
            }
          ' changed_ranges.tsv zizmor-output.txt > zizmor-output-pr.txt

          echo "Filtered findings (changed lines only):"
          stopMarker=$(uuidgen)
          echo "::stop-commands::$stopMarker"
          cat zizmor-output-pr.txt || true
          echo "::$stopMarker::"
      - name: Improve annotation messages
        if: steps.calculate_changes.outputs.has_relevant_files == 'true'
        shell: bash
        run: |
          set -euo pipefail

          # Remove the redundant "file:line:" prefix from the message body,
          # and append a link to the zizmor audit docs.
          sed -E \
            -e 's|(title=[a-zA-Z0-9_-]+::)[^:]+:[0-9]+: |\1|' \
            -e 's|title=([a-zA-Z0-9_-]+)(::.*)|title=\1\2. See https://docs.zizmor.sh/audits/#\1 for more information.|' \
            zizmor-output-pr.txt > zizmor-annotated.txt

          # Emit the annotations
          cat zizmor-annotated.txt
      - name: Create workflow summary
        if: steps.calculate_changes.outputs.has_relevant_files == 'true'
        shell: bash
        run: |
          set -euo pipefail

          count=$(wc -l < zizmor-output-pr.txt | tr -d ' ')

          {
            echo "## zizmor 🌈"
            echo ""
            if [ "$count" -eq 0 ]; then
              echo "No findings on changed lines."
            else
              echo "Found **${count}** finding(s) on changed lines."
              echo ""
              echo "| Severity | File | Line | Audit | Message |"
              echo "|----------|------|------|-------|---------|"
              # Parse each annotation line
              sed -n 's/^::\([a-z]*\) file=\([^,]*\),line=\([0-9]*\),title=\([a-zA-Z0-9_-]*\)::\(.*\)/| \1 | `\2` | \3 | [\4](https:\/\/docs.zizmor.sh\/audits\/#\4) | \5 |/p' \
                zizmor-output-pr.txt
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Comment on PR if too many findings
        if: steps.calculate_changes.outputs.has_relevant_files == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          count=$(wc -l < zizmor-output-pr.txt | tr -d ' ')
          if [ "$count" -gt 10 ]; then
            run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            gh pr comment "${{ github.event.pull_request.number }}" \
              --body "zizmor 🌈 found more than 10 issues, these will not all display through the GitHub UI. Please see ${run_url} for all findings."
          fi
