on:
  workflow_call:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Generate token for your org's repo
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.SYNC_APP_PRIVATE_KEY }}
          repositories: test
          owner: kurtismash2
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetches full history, important for syncing all branches/tags
      - name: Debug - verify token can see target repo
        env:
          TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          curl -s -o /dev/null -w "HTTP status: %{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/kurtismash2/test
      
      - name: Push to target repo
        run: |
          git remote add target https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/kurtismash2/test.git
          git push target main
